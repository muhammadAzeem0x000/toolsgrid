<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolsGrid - My Developer Toolbox</title>
    <meta name="description" content="A collection of my live web applications and developer tools.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='3' y='3' width='8' height='8' rx='2' fill='%2300f0ff'/><rect x='13' y='3' width='8' height='8' rx='2' fill='%23aa00ff'/><rect x='3' y='13' width='8' height='8' rx='2' fill='%23aa00ff'/><rect x='13' y='13' width='8' height='8' rx='2' fill='none' stroke='%2300f0ff' stroke-width='2'/></svg>">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-layer-group"></i> ToolsGrid
        </div>
        <div class="search-container">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search tools...">
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>My Developer Toolbox</h1>
            <p>A curated collection of my live web applications, built to tackle everyday problems.</p>
        </section>

        <section class="filters" id="categoryFilters">
            <!-- Filter pills will be injected here by JS -->
        </section>

        <section class="grid" id="toolsGrid">
            <!-- Tool cards will be injected here by JS -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ToolsGrid. All rights reserved.</p>
    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
